name: MODS (new approach to build bluefin)
on:
  workflow_dispatch:
  push:
    paths:
      - 'mods/**.*'
      - '.github/workflows/mods.yml'
  schedule:
    - cron: '0 7 * * 5' # At 07:00 AM UTC (midnight MST) every Friday

env:
  token: ${{ secrets.PAT_TOKEN_OCT_2025 }}

jobs:
  self-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      self_updated: ${{ steps.check.outputs.self_updated }}
      mods_changed: ${{ steps.mods_check.outputs.mods_changed }}
    steps:
      - name: Checkout dx4homelab/bluefin main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN_OCT_2025 }}

      - name: Configuring git user.name & user.email
        run: |
          echo "=== git config ${GITHUB_ACTOR}@users.noreply.github.com ===="
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Check if mods workflow needs self-update
        id: check
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN_OCT_2025 }}
        run: |
          echo "=== comparing mods/mods.yml with .github/workflows/mods.yml ==="
          if ! diff -q mods/mods.yml .github/workflows/mods.yml > /dev/null 2>&1; then
            echo "MODS workflow file has changed — self-updating"
            cp -v mods/mods.yml .github/workflows/mods.yml
            git add .github/workflows/mods.yml
            git commit -m "chore: self-update if .github/workflows/mods.yml workflow triggered by changes in mods/mods.yml"
            git push
            echo "=== triggering new mods workflow run ==="
            sleep 5
            gh workflow run mods.yml --ref main
            echo "self_updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "mods/mods.yml and .github/workflows/mods.yml are in sync"
            echo "self_updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for changes in mods subfolder
        id: mods_check
        run: |
          echo "=== checking for file changes in mods/ ==="
          if git diff --name-only HEAD~1 HEAD -- mods/ 2>/dev/null | grep -q .; then
            echo "Files changed in mods/ — forcing build trigger"
            echo "mods_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes detected in mods/"
            echo "mods_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if upstream bluefin has been updated
        run: |
          echo "=== fetching HEAD hash from ublue-os/bluefin ==="
          UPSTREAM_HASH=$(git ls-remote https://github.com/ublue-os/bluefin.git HEAD | awk '{print $1}')
          echo "Upstream HEAD hash: ${UPSTREAM_HASH}"
          SAVED_HASH=""
          if [ -f bluefin-head-hash.txt ]; then
            SAVED_HASH=$(cat bluefin-head-hash.txt | tr -d '[:space:]')
            echo "Saved HEAD hash:    ${SAVED_HASH}"
          else
            echo "No saved hash found (bluefin-head-hash.txt missing)"
          fi
          if [ "${UPSTREAM_HASH}" == "${SAVED_HASH}" ]; then
            echo "Upstream bluefin has NOT changed — skipping build"
            echo "BLUEFIN_UPDATED=false" >> "$GITHUB_ENV"
          else
            echo "Upstream bluefin has been updated — proceeding with build"
            echo "BLUEFIN_UPDATED=true" >> "$GITHUB_ENV"
            echo "${UPSTREAM_HASH}" > bluefin-head-hash.txt
          fi

  update-and-trigger-build:
    needs: self-update
    if: needs.self-update.outputs.self_updated != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout dx4homelab/bluefin main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN_OCT_2025 }}

      - name: Configuring git user.name & user.email
        run: |
          echo "=== git config ${GITHUB_ACTOR}@users.noreply.github.com ===="
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Set default BLUEFIN_UPDATED to true
        run: |
          echo "set dafault BLUEFIN_UPDATED=true"
          echo "BLUEFIN_UPDATED=true" >> "$GITHUB_ENV"

      - name: refresh ublue-os/bluefin
        if: ${{ env.BLUEFIN_UPDATED == 'true' }}
        run: |
          echo "=== upstream bluefin cleanup: folders ==="
          find . -maxdepth 1 -type d -not -path '.' | grep -vE '^\.$|^\./mods|^\./\.git$|^\./\.github$' | xargs -n1 rm -rf
          echo "=== git status after cleanup ==="
          git status
          echo "=== cloning upstream bluefin to mods/upstream ==="
          git clone -b main https://github.com/ublue-os/bluefin.git mods/upstream
          ls -lt mods
          echo "=== listing mods/upstream contents ==="
          find mods/upstream

          echo "=== initializing and updating submodules in mods/upstream ==="
          cd mods/upstream
          git submodule sync --recursive
          git submodule update --init --recursive --force --jobs 4
          cd ../..

          echo "=== listing mods/upstream contents after submodule update ==="
          find mods/upstream

          echo "=== replacing all bluefin files from fresh copy in mods/upstream ==="
          rsync -av --progress mods/upstream/ ./ --exclude .git
          rm -rf mods/upstream
          echo "=== git status after replacment ==="
          git status
          echo "=== git submodule update ==="
          git submodule update --init --recursive --force
          echo "=== Submodule status: ==="
          git submodule status --recursive
          echo "=== setting refresh ublue-os/bluefin ==="


      - name: Update custom actions, cosign.pub, README.md
        run: |
          echo "=== copy cosign.pub file from dx4homelab-mods ==="
          rm -fv .github/workflows/build-*.yml
          cp -v mods/build-dx4homelab-bluefin-dx-latest.yml .github/workflows
          cp -v mods/build-dx4homelab-bluefin-dx-stable.yml .github/workflows
          cp -v mods/build-disk.yml .github/workflows
          cp -rv mods/disk_config .
          cp mods/cosign.pub cosign.pub
          cp mods/README.md README.md
          mkdir -p build_files/mods
          cp -vf mods/customize-build.py build_files/mods/
          git add .
          echo "=== confirming main branch status after mods ==="
          git status

      - name: Reconcile .gitignore with custom entries
        run: |
          echo "=== reconciling .gitignore with mods/gitignore-addons.txt ==="
          while IFS= read -r line || [ -n "${line}" ]; do
            [ -z "${line}" ] || [[ "${line}" =~ ^[[:space:]]*# ]] && continue
            grep -qxF "${line}" .gitignore 2>/dev/null || echo "${line}" >> .gitignore
          done < mods/gitignore-addons.txt
          echo "=== .gitignore after reconciliation ==="
          cat .gitignore

      - name: Reconcile Justfile with custom recipes
        run: |
          echo "=== reconciling Justfile with mods/justfile-addons.just ==="
          MARKER="# === dx4homelab custom recipes ==="
          if ! grep -qF "${MARKER}" Justfile 2>/dev/null; then
            echo "" >> Justfile
            cat mods/justfile-addons.just >> Justfile
            echo "Custom recipes appended to Justfile"
          else
            echo "Justfile already contains custom recipes"
          fi
          echo "=== tail of Justfile ==="
          tail -30 Justfile

      - name: Update build scripts
        run: |
          echo "=== Update build scripts ==="
          #
          echo skipping original mods to build file to update packages
          echo bash build_files/mods/update-build-scripts.sh
          echo instead running python customization scripts
          python3 build_files/mods/customize-build.py --apply-defaults --write
          #
      - name: Update reusable-build.yml
        run: |
          #
          echo "=== updating reusable-build.yml ==="
          yq eval -v -i --from-file mods/yq-mods4reusable-build-yaml.yq .github/workflows/reusable-build.yml
          echo "=== asserting safe-kernel pin mod applied (tripwire for upstream step renames) ==="
          rb=".github/workflows/reusable-build.yml"
          grep -q 'id: kpin' "$rb" \
            || { echo "::error::safe-kernel mod failed: 'kpin' step missing from ${rb} (did upstream rename the 'build-image' step?)"; exit 1; }
          refs="$(grep -c 'steps.kpin.outputs.kernel_pin' "$rb" || true)"
          if [[ "${refs}" -lt 2 ]]; then
            echo "::error::safe-kernel mod failed: expected >=2 references to steps.kpin.outputs.kernel_pin (build-image + generate-tags), found ${refs} (upstream step rename?)"
            exit 1
          fi
          echo "safe-kernel pin mod OK (${refs} consumer refs rewired)"
          # sed -i 's/description: "The Fedora Version: gts, stable, or latest"/description: "The Fedora Version: stable, or latest"/' .github/workflows/reusable-build.yml
          # sed -i 's/cosign sign -y --key env:\/\/COSIGN_PRIVATE_KEY/cosign sign -y --yes --key env:\/\/COSIGN_PRIVATE_KEY/' .github/workflows/reusable-build.yml
          #
      - name: Update clean.yml
        run: |
          #
          echo "=== updating clean.yml (prune cleanup package list to images this fork publishes) ==="
          yq eval -i --from-file mods/yq-mods4clean-yaml.yq .github/workflows/clean.yml
          #
      - name: Commit modifications to reusable-build.yml
        run: |
          #
          echo "=== Commit modifications to reusable-build.yml ==="
          git add .
          git status
          #

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: 'chore: automated customization of upstream bluefin/dx build workflow files'
          committer_name: "${GITHUB_ACTOR}"
          committer_email: "${GITHUB_ACTOR}@users.noreply.github.com"
          add: .

      - name: Sleep for 10 seconds while above commit is effective
        shell: bash
        run: sleep 10s

      - name: Set MODS_CHANGED from self-update job
        run: |
          echo "MODS_CHANGED=${{ needs.self-update.outputs.mods_changed }}" >> "$GITHUB_ENV"
          echo "MODS_CHANGED=${{ needs.self-update.outputs.mods_changed }}"

      - name: Start build-latest-bluefin workflow
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN_OCT_2025 }}
        run: |
          echo "=== Checking GITHUB EVENT NAME $GITHUB_EVENT_NAME to trigger rebuilds conditionally ==="
          if [ "$GITHUB_EVENT_NAME" == "schedule" ]; then
            echo "=== Triggering all workflow by schedule ==="
            gh workflow run build-dx4homelab-bluefin-dx-stable.yml --ref main
            gh workflow run build-dx4homelab-bluefin-dx-latest.yml --ref main
          else
            echo "=== Triggering build-dx4homelab-bluefin-dx-latest.yml workflow by other triggers ==="
            gh workflow run build-dx4homelab-bluefin-dx-stable.yml --ref main
            gh workflow run build-dx4homelab-bluefin-dx-latest.yml --ref main
          fi
        #
